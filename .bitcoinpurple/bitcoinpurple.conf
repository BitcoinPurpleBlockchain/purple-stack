rpcuser=username
rpcpassword=password
server=1
listen=1
daemon=0
printtoconsole=0
txindex=1
addressindex=1
timestampindex=1
spentindex=1

bind=0.0.0.0
port=13496
rpcport=13495
rpcbind=0.0.0.0

# Allow RPC from Docker internal networks
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16

maxconnections=50
fallbackfee=0.0001

# BitcoinPurple network seed
addnode=144.91.120.225:13496

# ZeroMQ notifications (host-local only, exposed via docker-compose)
zmqpubrawblock=tcp://0.0.0.0:28334
zmqpubrawtx=tcp://0.0.0.0:28335
zmqpubhashblock=tcp://0.0.0.0:28332
zmqpubhashtx=tcp://0.0.0.0:28333
